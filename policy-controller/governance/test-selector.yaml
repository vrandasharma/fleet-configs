# clusterregistry/resource-enforced-selector.yaml
kind: ClusterSelector
apiVersion: configmanagement.gke.io/v1
metadata:
  name: resource-enforced-clusters
spec:
  selector:
    matchLabels:
      # This policy applies ONLY to clusters with this label in the fleet
      env: testclusterselector
      # You could also add 'tier: high-perf' or similar
---
apiVersion: constraints.gatekeeper.sh/v1beta1
kind: K8sRequiredResources
metadata:
  name: fleet-must-have-limits2
  annotations:
    # Only applies to clusters matching this selector in your Git repo
    configmanagement.gke.io/cluster-selector: resource-enforced-clusters
spec:
  enforcementAction: deny
  match:
    kinds:
      - apiGroups: [""]
        kinds: ["Pod"]
    # We exclude system namespaces to prevent core services from being blocked
    excludedNamespaces:
      - "kube-system"
      - "config-management-system"
      - "gatekeeper-system"
      - "gke-connect"
    # Adding comment 
  parameters:
    # This array defines the keys required under 'resources.limits'
    limits:
      - cpu
      - memory
